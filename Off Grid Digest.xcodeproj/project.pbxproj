			runOnlyForDeploymentPostprocessing = 0;
			shellPath = /bin/sh;
			shellScript = "#!/bin/bash\nset -euo pipefail\n\nHELPER_LABEL=\"com.ampedig.off-grid-digest.helper\"\nGO_SRC_DIR=\"${SRCROOT}/offgrid-digest-go\"\nCONFIG_SRC=\"${SRCROOT}/Support Files/config.ini\"\nAPP_SUPPORT_DEST=\"$HOME/Library/Containers/com.ampedig.Off-Grid-Digest/Data/Library/Application Support/MsgForward\"\nPLIST_DEST=\"$HOME/Library/LaunchAgents/${HELPER_LABEL}.plist\"\nHELPER_DEST=\"$APP_SUPPORT_DEST/offgrid-digest\"\nCONFIG_DEST=\"$APP_SUPPORT_DEST/config.ini\"\nLOG_DEST=\"$APP_SUPPORT_DEST/OffGridDigest.log\"\nLAUNCHD_LOG_DEST=\"$APP_SUPPORT_DEST/OffGridDigest.launchd.log\"\n\nGO_BIN=\"$(command -v go || true)\"\nif [ -z \"$GO_BIN\" ]; then\n  for candidate in /usr/local/go/bin/go /opt/homebrew/bin/go /usr/local/bin/go; do\n    if [ -x \"$candidate\" ]; then\n      GO_BIN=\"$candidate\"\n      break\n    fi\n  done\nfi\nif [ -z \"$GO_BIN\" ]; then\n  echo \"error: Go toolchain not found. Install Go or add it to Xcode's PATH.\"\n  exit 1\nfi\n\nmkdir -p \"$(dirname \"$PLIST_DEST\")\"\nmkdir -p \"$APP_SUPPORT_DEST\"\n\ncd \"$GO_SRC_DIR\"\n\"$GO_BIN\" build -o \"$HELPER_DEST\" ./cmd/offgrid-digest\nchmod +x \"$HELPER_DEST\"\n\nif [ ! -f \"$CONFIG_DEST\" ]; then\n  cp -f \"$CONFIG_SRC\" \"$CONFIG_DEST\"\nfi\n\ncat > \"$PLIST_DEST\" <<PLIST\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<!DOCTYPE plist PUBLIC \"-//Apple//DTD PLIST 1.0//EN\" \"http://www.apple.com/DTDs/PropertyList-1.0.dtd\">\n<plist version=\"1.0\">\n<dict>\n    <key>Label</key>\n    <string>${HELPER_LABEL}</string>\n    <key>ProgramArguments</key>\n    <array>\n        <string>${HELPER_DEST}</string>\n        <string>--watch</string>\n        <string>--interval=60s</string>\n    </array>\n    <key>RunAtLoad</key>\n    <true/>\n    <key>KeepAlive</key>\n    <false/>\n    <key>StandardOutPath</key>\n    <string>${LAUNCHD_LOG_DEST}</string>\n    <key>StandardErrorPath</key>\n    <string>${LAUNCHD_LOG_DEST}</string>\n</dict>\n</plist>\nPLIST\n\necho \"Built and installed Go helper executable to: $HELPER_DEST\"\necho \"Prepared config at: $CONFIG_DEST\"\necho \"Wrote LaunchAgent plist to: $PLIST_DEST\"\necho \"Go helper log will be written to: $LOG_DEST\"\necho 'Tail it with: tail -f \"$HOME/Library/Containers/com.ampedig.Off-Grid-Digest/Data/Library/Application Support/MsgForward/OffGridDigest.log\"'\necho 'LaunchAgent commands:'\necho '  launchctl print gui/$(id -u)/com.ampedig.off-grid-digest.helper'\necho '  launchctl bootout gui/$(id -u)/com.ampedig.off-grid-digest.helper'\necho '  launchctl bootstrap gui/$(id -u) \"$HOME/Library/LaunchAgents/com.ampedig.off-grid-digest.helper.plist\"'\necho '  launchctl kickstart -kp gui/$(id -u)/com.ampedig.off-grid-digest.helper'\n\nlaunchctl bootout gui/$(id -u)/com.jdaniel.forward-messages 2>/dev/null || true\nlaunchctl bootout gui/$(id -u) \"$PLIST_DEST\" 2>/dev/null || true\nlaunchctl bootstrap gui/$(id -u) \"$PLIST_DEST\"\n\n";
